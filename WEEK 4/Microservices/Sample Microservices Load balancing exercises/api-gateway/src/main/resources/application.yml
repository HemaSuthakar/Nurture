server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ---------------------------------------------------------------
        # Exercise 1: simple routing + logging filter to a single instance
        # ---------------------------------------------------------------
        - id: example_route
          uri: http://localhost:8081
          predicates:
            - Path=/example/**

        # ---------------------------------------------------------------
        # Exercise 2: load-balanced route across all example-service
        # instances registered below ("lb://" triggers Spring Cloud
        # LoadBalancer using the custom RandomLoadBalancer bean)
        # ---------------------------------------------------------------
        - id: load_balanced_route
          uri: lb://example-service
          predicates:
            - Path=/loadbalanced/**

        # ---------------------------------------------------------------
        # Exercise 3: same load-balanced backend, wrapped with a circuit
        # breaker + fallback
        # ---------------------------------------------------------------
        - id: resilient_route
          uri: lb://example-service
          predicates:
            - Path=/resilient/**
          filters:
            - name: CircuitBreaker
              args:
                name: exampleCircuitBreaker
                fallbackUri: forward:/fallback/resilient

    # Static service registry standing in for Eureka/Consul so that
    # "lb://example-service" has real instances to balance across.
    # Start extra backend-service instances (see README) and add them here.
    discovery:
      client:
        simple:
          instances:
            example-service:
              - uri: http://localhost:8081
              - uri: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.gateway: INFO
    org.springframework.cloud.gateway: INFO
