# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ---------------------------------------------------------------------------
# Database configuration (MySQL) - as per the hands-on document.
# Requires: MySQL Server 8.0 running locally, with schema "ormlearn" created:
#   mysql -u root -p
#   mysql> create schema ormlearn;
# ---------------------------------------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Run schema.sql / data.sql against MySQL too (creates + populates the
# country table automatically on startup). Set to "never" if you prefer
# to run the SQL scripts manually in MySQL Workbench, as the hands-on describes.
spring.sql.init.mode=always
# schema.sql uses "create table" without "if not exists" guarding via drop,
# so it is safe to re-run; ddl-auto=validate leaves table management to schema.sql.
spring.jpa.defer-datasource-initialization=false
