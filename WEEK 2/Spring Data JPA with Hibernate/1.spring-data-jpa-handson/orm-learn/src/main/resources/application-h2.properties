# ---------------------------------------------------------------------------
# H2 in-memory profile - lets you run the project immediately with no
# MySQL server installed. Activate with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
# or in Eclipse: Run Configurations > Arguments > VM args:
#   -Dspring.profiles.active=h2
# ---------------------------------------------------------------------------
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

# Optional H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
