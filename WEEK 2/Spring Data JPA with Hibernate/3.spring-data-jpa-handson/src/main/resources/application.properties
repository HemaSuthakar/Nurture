spring.application.name=spring-data-jpa-handson

# H2 in-memory database - zero setup required
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (optional) - browse to http://localhost:8080/h2-console while app is running
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Let Hibernate create the schema from the entities, then load data.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show generated SQL in the console/log - this is the important part for the hands-on exercises
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

logging.level.com.example.ormlearn=DEBUG
logging.level.org.hibernate.SQL=DEBUG
