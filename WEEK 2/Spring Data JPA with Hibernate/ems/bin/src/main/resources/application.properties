spring.application.name=EmployeeManagementSystem

# H2 in-memory database (Exercise 1)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 console (visit http://localhost:8080/h2-console after starting)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate (Exercise 1 & 10)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate batch processing (Exercise 10)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=8080
